<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Computer Lab Hours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #060b17;
      --surface:  #0c1428;
      --border:   #1a2540;
      --text:     #c8daff;
      --muted:    #3a4e72;
      --accent:   #4d8fff;
      --accent-dim: #1a3060;
      --open:     #2ecc71;
      --closed:   #e74c3c;
      --mono:     'DM Mono', monospace;
      --sans:     'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: min(480px, 96vw);
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2.5rem 2rem;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 300px; height: 160px;
      background: radial-gradient(ellipse, rgba(77,143,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Header */
    .header { text-align: center; margin-bottom: 2rem; }

    .lab-name {
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 4px;
    }

    .lab-location {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 14px;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-family: var(--mono);
      font-weight: 400;
      border: 0.5px solid;
      transition: all 0.4s ease;
    }
    .status-badge.open  { color: var(--open);   border-color: rgba(46,204,113,0.25); background: rgba(46,204,113,0.06);  }
    .status-badge.closed { color: var(--closed); border-color: rgba(231,76,60,0.25);  background: rgba(231,76,60,0.06); }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .status-badge.open .status-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Divider */
    .divider {
      border: none;
      border-top: 0.5px solid var(--border);
      margin: 1.75rem 0;
    }

    /* Hours table */
    .hours-section { margin-bottom: 1.75rem; }

    .section-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .hours-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 0.5px solid rgba(26,37,64,0.6);
      transition: background 0.2s;
    }
    .hours-row:last-child { border-bottom: none; }

    .day-name {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .day-name.today-name { color: var(--accent); font-weight: 500; }

    .today-tag {
      font-family: var(--mono);
      font-size: 0.6rem;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--accent-dim);
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .day-hours {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text);
    }
    .day-hours.is-closed { color: var(--muted); }

    /* Contact section */
    .contact-box {
      background: rgba(6,11,23,0.6);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }

    .manager-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 10px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 6px;
      font-family: var(--mono);
      font-weight: 300;
    }
    .contact-item svg { flex-shrink: 0; opacity: 0.5; }

    /* Footer */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sync-info {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sync-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }

    .current-time {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* Loading state */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, #1f2f50 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      height: 14px;
    }
    @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

    /* Error state */
    .error-msg {
      text-align: center;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--closed);
      padding: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="header">
      <div class="lab-name" id="labName">—</div>
      <div class="lab-location" id="labLocation">—</div>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span id="statusText">Loading…</span>
      </div>
    </div>

    <hr class="divider" />

    <div class="hours-section">
      <div class="section-label">Weekly Hours</div>
      <div id="hoursContainer">
        <!-- Skeleton placeholders while loading -->
        <div class="hours-row" style="gap:12px">
          <div class="skeleton" style="width:80px"></div>
          <div class="skeleton" style="width:130px"></div>
        </div>
        <div class="hours-row" style="gap:12px">
          <div class="skeleton" style="width:65px"></div>
          <div class="skeleton" style="width:130px"></div>
        </div>
        <div class="hours-row" style="gap:12px">
          <div class="skeleton" style="width:100px"></div>
          <div class="skeleton" style="width:130px"></div>
        </div>
      </div>
    </div>

    <div class="contact-box">
      <div class="section-label">Lab Manager</div>
      <div class="manager-name" id="managerName">—</div>
      <div id="contactItems"></div>
    </div>

    <div class="footer">
      <div class="sync-info">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncText">Loading…</span>
      </div>
      <div class="current-time" id="currentTime"></div>
    </div>

  </div>

  <script>
    const DAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    const DAY_LABELS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const REFRESH_MS = 60000; // re-fetch every 60 seconds

    // ─── Clock ────────────────────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      document.getElementById('currentTime').textContent =
        now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ─── Render helpers ───────────────────────────────────────────────────────
    function renderHours(hours) {
      const todayKey = DAYS[new Date().getDay()];
      const container = document.getElementById('hoursContainer');
      container.innerHTML = DAYS.map((key, i) => {
        const val    = hours[key] || 'Closed';
        const isToday = key === todayKey;
        const isClosed = val.toLowerCase() === 'closed';
        return `
          <div class="hours-row">
            <span class="day-name ${isToday ? 'today-name' : ''}">
              ${DAY_LABELS[i]}
              ${isToday ? '<span class="today-tag">today</span>' : ''}
            </span>
            <span class="day-hours ${isClosed ? 'is-closed' : ''}">${val}</span>
          </div>`;
      }).join('');
    }

    function renderStatus(hours) {
      const todayKey  = DAYS[new Date().getDay()];
      const todayHours = hours[todayKey] || 'Closed';
      const isOpen = todayHours.toLowerCase() !== 'closed';
      const badge  = document.getElementById('statusBadge');
      const text   = document.getElementById('statusText');
      badge.className = `status-badge ${isOpen ? 'open' : 'closed'}`;
      text.textContent = isOpen ? `Open today  ·  ${todayHours}` : 'Closed today';
    }

    function renderContact(manager) {
      document.getElementById('managerName').textContent = manager.name || '—';
      const items = [
        { icon: mailIcon(),   val: manager.email  },
        { icon: phoneIcon(),  val: manager.phone  },
        { icon: officeIcon(), val: manager.office },
      ].filter(i => i.val);
      document.getElementById('contactItems').innerHTML = items
        .map(i => `<div class="contact-item">${i.icon}${i.val}</div>`)
        .join('');
    }

    // Inline SVG icons (no external dependency)
    function mailIcon()   { return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>`; }
    function phoneIcon()  { return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.61 19 19.45 19.45 0 0 1 5 12.39 19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91A16 16 0 0 0 14.09 15.91l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`; }
    function officeIcon() { return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`; }

    // ─── Sync indicator ───────────────────────────────────────────────────────
    function setSyncing(active) {
      const dot = document.getElementById('syncDot');
      dot.className = `sync-dot ${active ? 'syncing' : ''}`;
    }

    function setSyncText(text) {
      document.getElementById('syncText').textContent = text;
    }

    // ─── Fetch & render ───────────────────────────────────────────────────────
    async function loadData() {
      setSyncing(true);
      setSyncText('Syncing…');
      try {
        // Cache-bust so the browser always gets the latest version
        const res  = await fetch(`hours.json?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        document.getElementById('labName').textContent     = data.lab_name     || 'Computer Lab';
        document.getElementById('labLocation').textContent = data.location     || '';

        renderHours(data.hours   || {});
        renderStatus(data.hours  || {});
        renderContact(data.manager || {});

        const now = new Date();
        setSyncText(`Last synced ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`);
      } catch (err) {
        console.error('Failed to load hours.json:', err);
        document.getElementById('hoursContainer').innerHTML =
          `<div class="error-msg">Could not load hours — check hours.json</div>`;
        setSyncText('Sync failed');
      } finally {
        setSyncing(false);
      }
    }

    // Load immediately, then every 60 seconds
    loadData();
    setInterval(loadData, REFRESH_MS);
  </script>
</body>
</html>
