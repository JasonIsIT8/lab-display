<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Computer Lab Hours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #1c2230;
      --border:     #2a3347;
      --text:       #f0f4ff;
      --text-sub:   #8b9bc8;
      --accent:     #58a6ff;
      --accent-bg:  #1a2f52;
      --open:       #3fb950;
      --open-bg:    #122d1a;
      --closed-clr: #f85149;
      --closed-bg:  #2d1117;
      --row-hover:  #1c2230;
      --today-hl:   #58a6ff;
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 2rem;
    }
 
    .page {
      width: min(1380px, 100%);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
 
    /* ── Header ── */
    .header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.25rem 3.25rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), #79c0ff, var(--accent));
    }
    .header-left { display: flex; flex-direction: column; gap: 6px; }
    .lab-name {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .lab-location { font-size: 1.25rem; color: var(--text-sub); }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
 
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 26px;
      border-radius: 999px;
      font-size: 1.25rem;
      font-weight: 600;
      border: 1.5px solid;
      white-space: nowrap;
      transition: all 0.3s ease;
    }
    .status-pill.open   { background: var(--open-bg);   color: var(--open);       border-color: var(--open); }
    .status-pill.closed { background: var(--closed-bg); color: var(--closed-clr); border-color: var(--closed-clr); }
    .status-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .status-pill.open .status-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
 
    .clock-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.9rem;
      font-weight: 500;
      color: var(--text-sub);
      text-align: right;
    }
 
    /* ── Three columns ── */
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      align-items: start;
    }
 
    /* ── Shared tile ── */
    .tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }
    .tile-header {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 1.6rem 2.2rem;
      border-bottom: 1px solid var(--border);
    }
    .tile-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--accent-bg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
    }
    .tile-title {
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-sub);
    }
    .tile-body { padding: 0.6rem 1.6rem 1.6rem; }
 
    /* ── Hours rows ── */
    .hours-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.05rem 0.75rem;
      border-radius: 10px;
      margin: 3px 0;
      transition: background 0.15s;
    }
    .hours-row:hover { background: var(--row-hover); }
    .hours-row.is-today { background: var(--accent-bg); }
    .day-col { display: flex; align-items: center; gap: 13px; }
    .day-label {
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--text-sub);
    }
    .hours-row.is-today .day-label { color: var(--today-hl); font-weight: 600; }
    .today-badge {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--accent);
      color: #0d1117;
    }
    .hours-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      font-weight: 500;
      color: var(--text);
    }
    .hours-val.is-closed { color: var(--text-sub); font-style: italic; font-weight: 400; }
    .hours-row.is-today .hours-val { color: var(--today-hl); }
 
    /* ── Manager tile ── */
    .manager-nameplate {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 1.4rem 0 1.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1rem;
    }
    .avatar {
      width: 65px; height: 65px;
      border-radius: 15px;
      background: var(--accent-bg);
      border: 1.5px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
    .manager-name { font-size: 1.5rem; font-weight: 600; color: var(--text); }
    .manager-role { font-size: 1rem; color: var(--text-sub); margin-top: 4px; }
 
    .contact-list { display: flex; flex-direction: column; gap: 13px; }
    .contact-row {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 0.9rem 1.1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 11px;
    }
    .contact-icon {
      width: 40px; height: 40px;
      border-radius: 9px;
      background: var(--accent-bg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
    }
    .contact-info { display: flex; flex-direction: column; gap: 3px; }
    .contact-label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-sub);
    }
    .contact-val { font-size: 1.2rem; font-weight: 500; color: var(--text); white-space: pre-line; }
 
    /* ── Staff location tile ── */
    .loc-body {
      padding: 2rem 2.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      text-align: center;
      min-height: 200px;
    }
    .loc-icon-wrap {
      width: 75px; height: 75px;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.4s, border-color 0.4s;
    }
    .loc-icon-wrap.is-open   { background: var(--open-bg);   border: 1.5px solid var(--open);       color: var(--open); }
    .loc-icon-wrap.is-closed { background: var(--closed-bg); border: 1.5px solid var(--closed-clr); color: var(--closed-clr); }
    .loc-icon-wrap.is-away   { background: #2d2208;          border: 1.5px solid #d29922;            color: #d29922; }
 
    .loc-status-label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-sub);
    }
    .loc-value {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      transition: color 0.4s;
    }
    .loc-value.is-open   { color: var(--open); }
    .loc-value.is-closed { color: var(--closed-clr); }
    .loc-value.is-away   { color: #d29922; }
 
    /* ── Footer ── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.1rem 2.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
    }
    .sync-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 1rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-sub);
    }
    .sync-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-sub);
      transition: background 0.3s;
    }
    .sync-dot.live { background: var(--open); animation: pulse 2s infinite; }
 
    /* ── Skeleton ── */
    .skel {
      background: linear-gradient(90deg, var(--border) 25%, var(--surface2) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 5px;
      display: inline-block;
    }
    @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }
 
    .error-msg {
      padding: 1.5rem;
      text-align: center;
      color: var(--closed-clr);
      font-size: 1.1rem;
    }
 
    /* ── Responsive ── */
    @media (max-width: 900px) {
      .columns { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: flex-start; }
      .header-right { align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="page">
 
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="lab-name" id="labName">Loading…</div>
      <div class="lab-location" id="labLocation"></div>
    </div>
    <div class="header-right">
      <div class="status-pill closed" id="statusPill">
        <span class="status-dot"></span>
        <span id="statusText">Loading…</span>
      </div>
      <div class="clock-display" id="clock"></div>
    </div>
  </div>
 
  <!-- Three columns -->
  <div class="columns">
 
    <!-- COL 1: Hours -->
    <div class="tile">
      <div class="tile-header">
        <div class="tile-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <span class="tile-title">Weekly Hours</span>
      </div>
      <div class="tile-body">
        <div id="hoursContainer">
          <div class="hours-row"><span class="skel" style="width:85px;height:15px"></span><span class="skel" style="width:120px;height:15px"></span></div>
          <div class="hours-row"><span class="skel" style="width:70px;height:15px"></span><span class="skel" style="width:120px;height:15px"></span></div>
          <div class="hours-row"><span class="skel" style="width:100px;height:15px"></span><span class="skel" style="width:120px;height:15px"></span></div>
        </div>
      </div>
    </div>
 
    <!-- COL 2: Lab Manager -->
    <div class="tile">
      <div class="tile-header">
        <div class="tile-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <span class="tile-title">Lab Manager</span>
      </div>
      <div class="tile-body">
        <div class="manager-nameplate">
          <div class="avatar" id="managerAvatar">?</div>
          <div>
            <div class="manager-name" id="managerName">—</div>
            <div class="manager-role">Computer Lab Manager</div>
          </div>
        </div>
        <div class="contact-list" id="contactList"></div>
      </div>
    </div>
 
    <!-- COL 3: Staff Location -->
    <div class="tile">
      <div class="tile-header">
        <div class="tile-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <span class="tile-title">Staff Location</span>
      </div>
      <div class="loc-body">
        <div class="loc-icon-wrap is-closed" id="locIcon">
          <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="locIconSvg">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
        </div>
        <div>
          <div class="loc-status-label">Currently Located</div>
          <div class="loc-value is-closed" id="locValue">—</div>
        </div>
      </div>
    </div>
 
  </div>
 
  <!-- Footer -->
  <div class="footer">
    <div class="sync-row">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Loading…</span>
    </div>
    <div class="sync-row">Auto-refreshes every 60 seconds</div>
  </div>
 
</div>
<script>
  const DAYS       = ['monday','tuesday','wednesday','thursday','friday'];
  const DAY_LABELS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  const ALL_DAYS   = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const REFRESH_MS = 60000;
 
  // ── Clock ──────────────────────────────────────────────────────────────────
  function tick() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  tick(); setInterval(tick, 1000);
 
  // ── Icons ──────────────────────────────────────────────────────────────────
  const icons = {
    mail:   `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>`,
    phone:  `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.45 19.45 0 0 1 5 12.39a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91A16 16 0 0 0 14.09 15.91l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`,
    office: `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  };
 
  // SVG paths for location icon states
  const SVG_PIN  = `<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>`;
  const SVG_DOOR = `<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`;
  const SVG_MOON = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
 
  // ── Render hours ───────────────────────────────────────────────────────────
  function renderHours(hours) {
    const todayKey = ALL_DAYS[new Date().getDay()];
    document.getElementById('hoursContainer').innerHTML = DAYS.map((key, i) => {
      const val      = hours[key] || 'Closed';
      const isToday  = key === todayKey;
      const isClosed = val.toLowerCase() === 'closed';
      return `<div class="hours-row ${isToday ? 'is-today' : ''}">
        <div class="day-col">
          <span class="day-label">${DAY_LABELS[i]}</span>
          ${isToday ? '<span class="today-badge">Today</span>' : ''}
        </div>
        <span class="hours-val ${isClosed && !isToday ? 'is-closed' : ''}">${val}</span>
      </div>`;
    }).join('');
  }
 
  // ── Render status pill ─────────────────────────────────────────────────────
  function renderStatus(hours) {
    const key    = ALL_DAYS[new Date().getDay()];
    const val    = hours[key] || 'Closed';
    const isOpen = val.toLowerCase() !== 'closed';
    const pill   = document.getElementById('statusPill');
    pill.className = `status-pill ${isOpen ? 'open' : 'closed'}`;
    document.getElementById('statusText').textContent =
      isOpen ? `Open Today  ·  ${val}` : 'Gone for the Day';
    return isOpen;
  }
 
  // ── Render staff location tile ─────────────────────────────────────────────
  // Logic:
  //   Lab is CLOSED (per schedule) → always "Gone for the Day" — cannot be overridden
  //   Lab is OPEN + status is set  → show the custom status (yellow/away style)
  //   Lab is OPEN + no status      → show "In the Lab" (green)
  function renderLocation(isOpen, manager) {
    const locIcon = document.getElementById('locIcon');
    const locVal  = document.getElementById('locValue');
    const locSvg  = document.getElementById('locIconSvg');
    const override = (manager.status || '').trim();
 
    if (!isOpen) {
      // Schedule says closed — hard override, always "Gone for the Day"
      locIcon.className  = 'loc-icon-wrap is-closed';
      locVal.className   = 'loc-value is-closed';
      locVal.textContent = 'Gone for the Day';
      locSvg.innerHTML   = SVG_MOON;
    } else if (override) {
      // Lab is open but a manual status is set in the JSON
      locIcon.className  = 'loc-icon-wrap is-away';
      locVal.className   = 'loc-value is-away';
      locVal.textContent = override;
      locSvg.innerHTML   = SVG_PIN;
    } else {
      // Lab is open, no override — default to "In the Lab"
      locIcon.className  = 'loc-icon-wrap is-open';
      locVal.className   = 'loc-value is-open';
      locVal.textContent = 'In the Lab';
      locSvg.innerHTML   = SVG_DOOR;
    }
  }
 
  // ── Render contact ─────────────────────────────────────────────────────────
  function renderContact(manager) {
    const name = manager.name || '—';
    document.getElementById('managerName').textContent = name;
    const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    document.getElementById('managerAvatar').textContent = initials || '?';
 
    const items = [
      { label: 'Email',  icon: icons.mail,   val: manager.email  },
      { label: 'Phone',  icon: icons.phone,  val: manager.phone  },
      { label: 'Office', icon: icons.office, val: manager.office },
    ].filter(c => c.val);
 
    document.getElementById('contactList').innerHTML = items.map(c => `
      <div class="contact-row">
        <div class="contact-icon">${c.icon}</div>
        <div class="contact-info">
          <span class="contact-label">${c.label}</span>
          <span class="contact-val">${c.val}</span>
        </div>
      </div>`).join('');
  }
 
  // ── Sync indicator ─────────────────────────────────────────────────────────
  function setSyncing(on) {
    document.getElementById('syncDot').className = `sync-dot ${on ? '' : 'live'}`;
  }
 
  // ── Fetch & render ─────────────────────────────────────────────────────────
  async function loadData() {
    setSyncing(true);
    document.getElementById('syncText').textContent = 'Syncing…';
    try {
      const res  = await fetch(`hours.json?t=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
 
      document.getElementById('labName').textContent     = data.lab_name || 'Computer Lab';
      document.getElementById('labLocation').textContent = data.location || '';
 
      renderHours(data.hours || {});
      const isOpen = renderStatus(data.hours || {});
      renderContact(data.manager || {});
      renderLocation(isOpen, data.manager || {});
 
      const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('syncText').textContent = `Last synced ${t}`;
      setSyncing(false);
    } catch (err) {
      document.getElementById('hoursContainer').innerHTML =
        `<div class="error-msg">Could not load hours.json — check the file on GitHub</div>`;
      document.getElementById('syncText').textContent = 'Sync failed';
      setSyncing(true);
    }
  }
 
  loadData();
  setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
